# .github/workflows/daily-update.yml
#
# PATH #2 — Auto-update live_data.json daily via GitHub Actions
#
# Status: READY (currently disabled). To enable:
#   1. Create folder `.github/workflows/` in your repo
#   2. Move this file there as `daily-update.yml`
#   3. Uncomment the `on.schedule` block below
#   4. Commit and push — Actions runs at 11:00 UTC (7am ET) daily
#
# To trigger manually (after enabling): go to repo → Actions tab → "Daily Live Data Update" → Run workflow

name: Daily Live Data Update

on:
  # Uncomment to enable scheduled runs:
  # schedule:
  #   - cron: "0 11 * * *"  # 11:00 UTC = 7am ET daily
  workflow_dispatch:        # Allow manual trigger from Actions tab (always on)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit the updated JSON back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run update script
        run: python3 update_live_data.py --quiet
        continue-on-error: true  # Don't fail the workflow if scraping fails

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live_data.json
          if ! git diff --staged --quiet; then
            git commit -m "auto-update live_data.json $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
