<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Knockout Bracket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#00C853;--green-light:#1FE07A;--green-dark:#0d3318;
  --navy:#0b1018;--navy2:#111827;--navy3:#1f2937;--navy4:#374151;
  --line:#27313f;--gray3:#9CA3AF;--gray4:#6B7280;--ink:#E8EDF2;
  --red:#E24B4A;--amber:#F5A623;
  --r0:#7f1d1d;--r1:#b91c1c;--mid:#52525b;--g1:#15803d;--g0:#16a34a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 70% -10%, #16202e 0%, var(--navy) 55%);
  color:var(--ink);font-family:'Saira',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:1640px;margin:0 auto;padding:18px 20px 80px}
header.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.badge{width:34px;height:34px;border-radius:50%;background:var(--green);display:grid;place-items:center;
  color:#06140a;font-weight:800;font-size:20px;box-shadow:0 0 18px rgba(0,200,83,.35)}
h1{font-family:'Saira Condensed';font-weight:700;font-size:30px;letter-spacing:.5px;line-height:1}
h1 small{display:block;font-family:'Saira';font-weight:500;font-size:12px;color:var(--gray3);letter-spacing:.3px;margin-top:3px}
.toolbar{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{font-family:'Saira';font-weight:600;font-size:12.5px;color:var(--ink);background:var(--navy3);
  border:1px solid var(--line);border-radius:8px;padding:8px 13px;cursor:pointer;transition:.15s;letter-spacing:.2px}
.btn:hover{background:var(--navy4);border-color:#4b5563}
.btn.primary{background:var(--green);color:#06140a;border-color:transparent}
.btn.primary:hover{background:var(--green-light)}
.legend{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--gray3);margin:10px 2px 16px}
.scale{height:9px;width:150px;border-radius:5px;background:linear-gradient(90deg,var(--r1),var(--mid),var(--g0))}
.hint{font-size:11.5px;color:var(--gray4)}

/* BRACKET LAYOUT */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:18px;align-items:stretch}
.col{display:flex;flex-direction:column;min-width:208px;flex:0 0 auto}
.col.center{min-width:236px}
.coltitle{font-family:'Saira Condensed';font-weight:700;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--gray3);text-align:center;padding:6px 0 4px;position:sticky;top:0;background:transparent;z-index:2}
.colbody{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:8px}

.match{background:linear-gradient(180deg,#141d2a,#0f1620);border:1px solid var(--line);border-radius:10px;
  overflow:hidden;position:relative;transition:.15s;cursor:pointer}
.match:hover{border-color:#3b4a5e;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.match.sel{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 22px rgba(0,200,83,.25)}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(255,255,255,.025);
  font-size:9.5px;letter-spacing:.4px;color:var(--gray4);border-bottom:1px solid var(--line)}
.mhead b{color:var(--gray3);font-weight:600}
.slot{display:flex;align-items:center;gap:7px;padding:7px 8px;min-height:34px;position:relative}
.slot+.slot{border-top:1px solid var(--line)}
.slot .fl{font-size:16px;line-height:1;width:20px;text-align:center;flex:0 0 auto}
.slot .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.slot.ph .nm{color:var(--gray4);font-weight:500;font-style:italic;font-size:12px}
.slot .wp{font-family:'Saira Condensed';font-weight:700;font-size:11.5px;color:var(--gray3);flex:0 0 auto}
.slot.win{background:rgba(0,200,83,.07)}
.slot.win .nm{color:var(--green-light)}
.slot.win::after{content:"✓";color:var(--green);font-size:11px;font-weight:800;margin-left:2px}
.slot.clk:hover{background:rgba(255,255,255,.05)}
.slot select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:0}
.advbtn{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;background:var(--navy4);
  border:1px solid var(--line);border-radius:5px;color:var(--gray3);padding:2px 5px;cursor:pointer;opacity:0;transition:.12s}
.match:hover .advbtn{opacity:1}
.advbtn:hover{background:var(--green);color:#06140a;border-color:transparent}
.spacer{flex:1}

/* champion banner */
.champwrap{display:flex;flex-direction:column;justify-content:center;min-width:200px}
.champ-card{background:linear-gradient(180deg,#1a2433,#0e1521);border:1px solid var(--green);border-radius:12px;
  padding:16px;text-align:center;box-shadow:0 0 30px rgba(0,200,83,.18)}
.champ-card .lbl{font-family:'Saira Condensed';letter-spacing:2px;font-size:11px;color:var(--green);text-transform:uppercase}
.champ-card .fl{font-size:40px;margin:8px 0 2px}
.champ-card .nm{font-family:'Saira Condensed';font-weight:700;font-size:20px}
.champ-card .sub{font-size:11px;color:var(--gray4);margin-top:4px}

/* DETAIL PANEL */
.panel{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:#0c121b;
  border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(0,0,0,.5);transform:translateX(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:40;overflow-y:auto;padding:18px 18px 40px}
.panel.open{transform:translateX(0)}
.panel .x{position:absolute;top:14px;right:14px;background:var(--navy3);border:1px solid var(--line);color:var(--ink);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px}
.panel .x:hover{background:var(--navy4)}
.ph-team{display:flex;align-items:center;gap:11px;margin:2px 0 14px}
.ph-team .fl{font-size:34px}
.ph-team .nm{font-family:'Saira Condensed';font-weight:700;font-size:23px;line-height:1}
.ph-team .meta{font-size:11.5px;color:var(--gray3);margin-top:3px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.kpi{background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.kpi .k{font-size:10px;letter-spacing:.5px;color:var(--gray4);text-transform:uppercase}
.kpi .v{font-family:'Saira Condensed';font-weight:700;font-size:19px;margin-top:1px}
.sectitle{font-family:'Saira Condensed';font-weight:700;letter-spacing:1px;font-size:12px;color:var(--gray3);
  text-transform:uppercase;margin:6px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
.ladder{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.lrow{display:grid;grid-template-columns:78px 1fr 46px;align-items:center;gap:8px;font-size:12px}
.lrow .lb{color:var(--gray3)}
.bar{height:15px;border-radius:4px;background:var(--navy3);overflow:hidden;position:relative}
.bar>span{position:absolute;inset:0 auto 0 0;border-radius:4px}
.lrow .pv{font-family:'Saira Condensed';font-weight:700;text-align:right}
.cmp{display:grid;grid-template-columns:1fr 30px 1fr;gap:6px;align-items:center;margin-bottom:18px}
.cmp .ct{text-align:center}
.cmp .ct .fl{font-size:26px}
.cmp .ct .nm{font-family:'Saira Condensed';font-weight:700;font-size:14px;line-height:1.05;margin-top:2px}
.cmp .ct .gp{font-size:10px;color:var(--gray4)}
.cmp .vs{text-align:center;font-family:'Saira Condensed';color:var(--gray4);font-size:12px}
.cmprow{display:grid;grid-template-columns:1fr 80px 1fr;gap:6px;align-items:center;font-size:12px;
  padding:5px 0;border-bottom:1px solid var(--line)}
.cmprow .clab{text-align:center;color:var(--gray4);font-size:10px;letter-spacing:.4px;text-transform:uppercase}
.cmprow .cv{font-family:'Saira Condensed';font-weight:700;font-size:14px}
.cmprow .cv.l{text-align:right}.cmprow .cv.r{text-align:left}
.cand{font-size:12px;color:var(--gray3);line-height:1.6}
.gsplit{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
.gsplit .gcell{background:var(--navy2);border:1px solid var(--line);border-radius:8px;padding:7px 4px;text-align:center}
.gsplit .gp{font-size:10px;letter-spacing:.5px;color:var(--gray4);text-transform:uppercase}
.gsplit .gv{font-family:'Saira Condensed';font-weight:700;font-size:15px;margin-top:1px}
.prov{font-size:10px;color:var(--gray4);line-height:1.5;margin-top:16px;padding-top:10px;border-top:1px solid var(--line)}
.cand b{color:var(--ink)}
.note{font-size:11px;color:var(--gray4);background:var(--navy2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;line-height:1.5;margin-bottom:14px}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:35}
.scrim.on{opacity:1;pointer-events:auto}
@media(max-width:640px){.wrap{padding:12px 10px 60px}h1{font-size:23px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="badge">✦</div>
    <h1>World Cup 2026 — Knockout Bracket<small id="updlbl"></small></h1>

  <div class="board" id="board"></div>
</div>
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel"><button class="x" id="px">✕</button><div id="pbody"></div></aside>

<script>
/* ---------- state ---------- */
const SLOTS = {};           // matchNo -> {a:team|null, b:team|null, winner:'a'|'b'|null}
const ALL_MATCHES = {};     // matchNo -> match def + round
const ROUNDS = [["R32","Round of 32",WC.BRACKET.R32],["R16","Round of 16",WC.BRACKET.R16],
                ["QF","Quarter-finals",WC.BRACKET.QF],["SF","Semi-finals",WC.BRACKET.SF]];
WC.BRACKET.R32.forEach(m=>ALL_MATCHES[m.m]={...m,round:"R32"});
WC.BRACKET.R16.forEach(m=>ALL_MATCHES[m.m]={...m,round:"R16"});
WC.BRACKET.QF.forEach(m=>ALL_MATCHES[m.m]={...m,round:"QF"});
WC.BRACKET.SF.forEach(m=>ALL_MATCHES[m.m]={...m,round:"SF"});
ALL_MATCHES[104]={...WC.BRACKET.FINAL,round:"FINAL"};
ALL_MATCHES[103]={...WC.BRACKET.THIRD,round:"THIRD"};
Object.keys(ALL_MATCHES).forEach(n=>SLOTS[n]={a:null,b:null,winner:null});

document.getElementById('updlbl').textContent = WC.updated + " · slots editable as teams qualify";

/* ---------- persistence ---------- */
const LSKEY='wc2026_bracket_v1';
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(SLOTS));}catch(e){}}
function load(){try{const r=localStorage.getItem(LSKEY);if(r){const s=JSON.parse(r);
  for(const k in s) if(SLOTS[k]) SLOTS[k]=s[k];}}catch(e){}}

/* ---------- helpers ---------- */
const GRPNAME={W:"Winner",R:"Runner-up"};
function slotLabel(code){
  if(code[0]==="W") return "Winner "+code.slice(2);
  if(code[0]==="R") return "Runner-up "+code.slice(2);
  if(code[0]==="T") return "3rd "+code.slice(2).split("").join("/");
  return code;
}
function eligibleTeams(code){
  if(code[0]==="W"||code[0]==="R") return WC.GROUPS[code.slice(2)]||[];
  if(code[0]==="T"){const gs=code.slice(2).split("");let out=[];gs.forEach(g=>out=out.concat(WC.GROUPS[g]||[]));return out;}
  return [];
}
// resolve the two participants of a match (team names or null) given current state
function participant(matchNo,side){
  const m=ALL_MATCHES[matchNo];const ref=m[side];
  if(typeof ref==="string"){ // R32 slot code
    return {team:SLOTS[matchNo][side], code:ref, kind:"slot"};
  } else { // feeder match number
    const feeder=SLOTS[ref];
    let team=null;
    if(feeder&&feeder.winner){ team = m.loser ? null : (feeder.winner==="a"?feeder.aTeamResolved:feeder.bTeamResolved); }
    if(m.loser && feeder && feeder.winner){ team = feeder.winner==="a"?feeder.bTeamResolved:feeder.aTeamResolved; }
    return {team, code:(m.loser?"Loser ":"Winner ")+ref, kind:"feeder", feeder:ref};
  }
}
function pct(x){return x==null?"—":(Math.round(x*1000)/10).toFixed(1)+"%";}
// green->red self-scaling color within a set of values
function heat(v,min,max){
  if(v==null) return "var(--navy3)";
  let t = max>min ? (v-min)/(max-min) : .5;
  t=Math.max(0,Math.min(1,t));
  // interpolate red(0)->mid(.5)->green(1)
  const stops=[[127,29,29],[82,82,91],[22,163,74]];
  let c;
  if(t<.5){const k=t/.5;c=mix(stops[0],stops[1],k);}else{const k=(t-.5)/.5;c=mix(stops[1],stops[2],k);}
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function mix(a,b,k){return a.map((x,i)=>Math.round(x+(b[i]-x)*k));}

/* ---------- render bracket ---------- */
const board=document.getElementById('board');
let SELECTED=null;
function render(){
  resolveAll();
  board.innerHTML="";
  ROUNDS.forEach(([key,title,arr])=>{
    const col=document.createElement('div');col.className="col"+(key==="SF"?" center":"");
    col.innerHTML=`<div class="coltitle">${title}</div>`;
    const cb=document.createElement('div');cb.className="colbody";
    arr.forEach(m=>cb.appendChild(matchEl(m.m)));
    col.appendChild(cb);board.appendChild(col);
  });
  // champion + final + third
  const fc=document.createElement('div');fc.className="col champwrap";
  fc.innerHTML=`<div class="coltitle">Final</div>`;
  const fb=document.createElement('div');fb.className="colbody";
  fb.appendChild(matchEl(104));
  // champion card
  const champ=championTeam();
  const cc=document.createElement('div');cc.className="champ-card";cc.style.marginTop="14px";
  if(champ){cc.innerHTML=`<div class="lbl">Champion</div><div class="fl">${WC.TEAMS[champ].flag}</div>
     <div class="nm">${champ}</div><div class="sub">${pct(WC.TEAMS[champ].champ)} pre-tournament title odds</div>`;}
  else {cc.innerHTML=`<div class="lbl">Champion</div><div class="fl" style="opacity:.3">🏆</div>
     <div class="nm" style="color:var(--gray4);font-size:15px">To be decided</div>
     <div class="sub">Set the final winner to crown</div>`;}
  fb.appendChild(cc);
  // third place
  const tp=document.createElement('div');tp.style.marginTop="14px";
  tp.innerHTML=`<div class="coltitle" style="font-size:11px">Third place</div>`;
  tp.appendChild(matchEl(103));
  fb.appendChild(tp);
  fc.appendChild(fb);board.appendChild(fc);
}

function matchEl(no){
  const m=ALL_MATCHES[no];const st=SLOTS[no];
  const el=document.createElement('div');el.className="match"+(SELECTED===no?" sel":"");
  const pa=participant(no,"a"),pb=participant(no,"b");
  el.innerHTML=`<div class="mhead"><b>Match ${no}</b><span>${m.date} · ${m.venue}</span></div>`;
  el.appendChild(slotEl(no,"a",pa,st));
  el.appendChild(slotEl(no,"b",pb,st));
  el.querySelector('.mhead').addEventListener('click',e=>{e.stopPropagation();openCompare(no);});
  el.addEventListener('click',()=>openCompare(no));
  return el;
}
function slotEl(no,side,part,st){
  const s=document.createElement('div');
  const team=part.team;
  const isWin = st.winner===side;
  s.className="slot"+(team?" clk":" ph")+(isWin?" win":"");
  if(team){
    const T=WC.TEAMS[team];
    s.innerHTML=`<span class="fl">${T.flag}</span><span class="nm">${team}</span><span class="wp">${pct(T.champ)}</span>`;
    s.addEventListener('click',e=>{e.stopPropagation();openTeam(team);});
    // advance control
    if(no!==103){const a=document.createElement('button');a.className="advbtn";a.textContent=isWin?"won":"advance";
      a.title="Mark winner → next round";
      a.addEventListener('click',e=>{e.stopPropagation();setWinner(no,side);});
      s.appendChild(a);}
  } else {
    s.innerHTML=`<span class="fl">·</span><span class="nm">${part.code? (part.kind==="slot"?slotLabel(part.code):part.code) : "TBD"}</span>`;
    if(part.kind==="slot"){
      const sel=document.createElement('select');
      sel.innerHTML=`<option value="">Assign team…</option>`+
        eligibleTeams(part.code).map(t=>`<option value="${t}">${WC.TEAMS[t].flag} ${t}</option>`).join("");
      sel.addEventListener('click',e=>e.stopPropagation());
      sel.addEventListener('change',e=>{assign(no,side,e.target.value);});
      s.appendChild(sel);
    }
  }
  return s;
}

/* ---------- mutations ---------- */
function assign(no,side,team){ SLOTS[no][side]=team||null; if(SLOTS[no].winner===side&&!team)SLOTS[no].winner=null; save();render(); }
function setWinner(no,side){
  const part=participant(no,side); if(!part.team)return;
  SLOTS[no].winner = (SLOTS[no].winner===side?null:side);
  save();render();
}
// resolve aTeamResolved/bTeamResolved on every match so feeders can read winners
function resolveAll(){
  // iterate rounds in order so earlier winners propagate
  const order=[...WC.BRACKET.R32,...WC.BRACKET.R16,...WC.BRACKET.QF,...WC.BRACKET.SF,WC.BRACKET.FINAL,WC.BRACKET.THIRD];
  order.forEach(m=>{
    const a=participant(m.m,"a"),b=participant(m.m,"b");
    SLOTS[m.m].aTeamResolved=a.team;SLOTS[m.m].bTeamResolved=b.team;
    // clear stale winner if participant missing
    if(SLOTS[m.m].winner==="a"&&!a.team)SLOTS[m.m].winner=null;
    if(SLOTS[m.m].winner==="b"&&!b.team)SLOTS[m.m].winner=null;
  });
}
function championTeam(){const f=SLOTS[104];if(f&&f.winner)return f.winner==="a"?f.aTeamResolved:f.bTeamResolved;return null;}

/* ---------- panels ---------- */
const panel=document.getElementById('panel'),pbody=document.getElementById('pbody'),scrim=document.getElementById('scrim');
function showPanel(html){pbody.innerHTML=html;panel.classList.add('open');scrim.classList.add('on');}
function closePanel(){panel.classList.remove('open');scrim.classList.remove('on');SELECTED=null;render();}
document.getElementById('px').addEventListener('click',closePanel);
scrim.addEventListener('click',closePanel);

const LADDER=[["win_grp","Win group"],["qualify","Reach R32"],["top2","Top 2"],["r16","Reach R16"],
              ["qf","Reach QF"],["sf","Reach SF"],["final","Reach final"],["champ","Champion"]];
function teamLadder(team){
  const T=WC.TEAMS[team];
  return `<div class="ladder">`+LADDER.map(([k,lb])=>{
    const v=T[k]; const w=v==null?0:Math.max(2,v*100);
    return `<div class="lrow"><span class="lb">${lb}</span>
      <div class="bar"><span style="width:${w}%;background:${heat(v,0,1)}"></span></div>
      <span class="pv">${pct(v)}</span></div>`;
  }).join("")+`</div>`;
}
function openTeam(team){
  const T=WC.TEAMS[team];
  const projRank=["1st","2nd","3rd","4th"][T.proj_rank]||"—";
  showPanel(`
    <div class="ph-team"><span class="fl">${T.flag}</span><div>
      <div class="nm">${team}</div>
      <div class="meta">Group ${T.group} · projected ${projRank} (${T.p_pts!=null?T.p_pts.toFixed(2)+" pts":"—"})</div></div></div>
    <div class="kpis">
      <div class="kpi"><div class="k">FIFA rank</div><div class="v">${T.fifa??"—"}</div></div>
      <div class="kpi"><div class="k">Elo</div><div class="v">${T.elo??"—"}</div></div>
      <div class="kpi"><div class="k">Title odds</div><div class="v" style="color:var(--green-light)">${pct(T.champ)}</div></div>
      <div class="kpi"><div class="k">Win group</div><div class="v">${pct(T.win_grp)}</div></div>
    </div>
    <div class="sectitle">Path probability · Giffen</div>
    ${teamLadder(team)}
    <div class="sectitle">Group finish · Giffen</div>
    <div class="gsplit">
      ${[["1st",T.g1],["2nd",T.g2],["3rd",T.g3],["4th",T.g4]].map(([lb,v])=>
        `<div class="gcell"><div class="gp">${lb}</div><div class="gv">${pct(v)}</div></div>`).join("")}
    </div>
    <div class="note" style="margin-top:8px">Advance as best 3rd: <b>${pct(T.adv3)}</b></div>
    <div class="sectitle" style="margin-top:14px">Projected group line · BETSiE</div>
    <div class="note">${T.p_w!=null?T.p_w.toFixed(2):"—"}W · ${T.p_d!=null?T.p_d.toFixed(2):"—"}D · ${T.p_l!=null?T.p_l.toFixed(2):"—"}L &nbsp;|&nbsp;
      GF ${T.p_gf!=null?T.p_gf.toFixed(1):"—"} · GA ${T.p_ga!=null?T.p_ga.toFixed(1):"—"} · GD ${T.p_gd!=null?(T.p_gd>=0?'+':'')+T.p_gd.toFixed(1):"—"} · ${T.p_pts!=null?T.p_pts.toFixed(2)+" pts":"—"}</div>
    <div class="prov">Probabilities & group split: Giffen Tournament Sims · Expected table: BETSiE · FIFA/Elo: tool ratings</div>
  `);
}
const CMP=[["champ","Champion"],["final","Reach final"],["sf","Reach SF"],["qf","Reach QF"],["r16","Reach R16"],["fifa","FIFA rank"],["elo","Elo"]];
function openCompare(no){
  SELECTED=no;render();
  const m=ALL_MATCHES[no];const pa=participant(no,"a"),pb=participant(no,"b");
  const ta=pa.team,tb=pb.team;
  const head=(p)=>{ if(p.team){const T=WC.TEAMS[p.team];
      return `<div class="ct"><div class="fl">${T.flag}</div><div class="nm">${p.team}</div><div class="gp">Grp ${T.group}</div></div>`;}
    return `<div class="ct"><div class="fl" style="opacity:.3">·</div><div class="nm" style="color:var(--gray4);font-size:12px">${pa===p? (pa.kind==="slot"?slotLabel(pa.code):pa.code):(pb.kind==="slot"?slotLabel(pb.code):pb.code)}</div></div>`;};
  let rows="";
  CMP.forEach(([k,lb])=>{
    const va=ta?WC.TEAMS[ta][k]:null, vb=tb?WC.TEAMS[tb][k]:null;
    const fmt=(v)=>v==null?"—":(k==="fifa"||k==="elo"?v:pct(v));
    rows+=`<div class="cmprow"><div class="cv l">${fmt(va)}</div><div class="clab">${lb}</div><div class="cv r">${fmt(vb)}</div></div>`;
  });
  let candHtml="";
  [["a",pa],["b",pb]].forEach(([sd,p])=>{
    if(!p.team && p.kind==="slot"){
      const cands=eligibleTeams(p.code).slice().sort((x,y)=>(WC.TEAMS[y].champ)-(WC.TEAMS[x].champ));
      candHtml+=`<div class="cand"><b>${slotLabel(p.code)}</b> candidates: `+
        cands.map(t=>`${WC.TEAMS[t].flag} ${t} (${pct(WC.TEAMS[t].champ)})`).join(" · ")+`</div>`;
    }
  });
  showPanel(`
    <div class="sectitle">Match ${no} · ${m.date} · ${m.venue}</div>
    <div class="cmp">${head(pa)}<div class="vs">vs</div>${head(pb)}</div>
    ${(ta||tb)?`<div class="sectitle">Side-by-side</div>${rows}`:""}
    ${candHtml?`<div class="sectitle" style="margin-top:14px">Who can fill these slots</div>${candHtml}`:""}
    ${(ta&&tb)?`<div class="note" style="margin-top:14px">Hover a team in the bracket and click <b>advance</b> to push the winner into Match ${nextMatchOf(no)||"—"}.</div>`:""}
  `);
}
function nextMatchOf(no){
  for(const k in ALL_MATCHES){const m=ALL_MATCHES[k];if(m.a===no||m.b===no)return k;}return null;
}

/* ---------- toolbar ---------- */
document.getElementById('reset').addEventListener('click',()=>{
  if(!confirm("Clear all assigned teams and results?"))return;
  for(const k in SLOTS)SLOTS[k]={a:null,b:null,winner:null};save();render();closePanel();
});
document.getElementById('fillproj').addEventListener('click',()=>{
  // fill Winner/Runner-up slots from projected standings; leave 3rd-place slots for manual entry
  WC.BRACKET.R32.forEach(m=>{
    ["a","b"].forEach(sd=>{
      const code=m[sd];
      if(code[0]==="W"||code[0]==="R"){
        const g=code.slice(2);const teams=WC.GROUPS[g];
        const idx=code[0]==="W"?0:1; // projected winner / runner-up by standings order
        // GROUPS are stored in projected standings order
        if(teams&&teams[idx])SLOTS[m.m][sd]=teams[idx];
      }
    });
  });
  save();render();
});

/* ---------- pre-seed confirmed group winners (verified Jun 23) ---------- */
function seedConfirmed(){
  // Mexico=Win A, USA=Win D, Germany=Win E, Argentina=Win J  (FIFA-confirmed group winners)
  const conf={"W-A":"Mexico","W-D":"United States","W-E":"Germany","W-J":"Argentina"};
  WC.BRACKET.R32.forEach(m=>["a","b"].forEach(sd=>{
    const c=m[sd]; if(conf[c]) SLOTS[m.m][sd]=conf[c];
  }));
}

load();
// only seed if nothing saved yet
let any=false;for(const k in SLOTS){if(SLOTS[k].a||SLOTS[k].b){any=true;break;}}
if(!any)seedConfirmed();
render();
</script>
