<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Knockout Bracket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#00C853;--green-light:#1FE07A;--green-dark:#0d3318;
  --navy:#0b1018;--navy2:#111827;--navy3:#1f2937;--navy4:#374151;
  --line:#27313f;--gray3:#9CA3AF;--gray4:#6B7280;--ink:#E8EDF2;
  --red:#E24B4A;--amber:#F5A623;
  --r0:#7f1d1d;--r1:#b91c1c;--mid:#52525b;--g1:#15803d;--g0:#16a34a;
  /* semantic surfaces + adaptive greens (dark defaults) */
  --body-tint:#16202e;--card-top:#141d2a;--card-bot:#0f1620;--panel-bg:#0c121b;
  --head:rgba(255,255,255,.03);--hover-fill:rgba(255,255,255,.05);--hover-border:#3b4a5e;
  --knob:#9aa6b5;--label-dim:rgba(255,255,255,0.5);
  --pos:#1FE07A;--pos2:#00C853;
}
body.light{
  --navy:#eef1f5;--navy2:#ffffff;--navy3:#eef2f7;--navy4:#e2e8f0;
  --line:#d8dee7;--ink:#0f172a;--gray3:#475569;--gray4:#64748b;
  --body-tint:#e7edf4;--card-top:#ffffff;--card-bot:#f5f8fc;--panel-bg:#ffffff;
  --head:rgba(15,23,42,.04);--hover-fill:rgba(15,23,42,.05);--hover-border:#b9c4d2;
  --knob:#ffffff;--label-dim:rgba(15,23,42,0.5);
  --pos:#0a9d4a;--pos2:#067a37;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 70% -10%, var(--body-tint) 0%, var(--navy) 55%);
  color:var(--ink);font-family:'Saira',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:1640px;margin:0 auto;padding:18px 20px 80px}
header.top{margin-bottom:18px;padding-bottom:15px;border-bottom:1px solid var(--line);position:relative}
header.top::after{content:"";position:absolute;left:0;bottom:-1px;width:72px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,var(--green),rgba(0,200,83,0))}
.hdr-main{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.check{background:var(--green);color:var(--green-dark);width:46px;height:46px;border-radius:11px;display:flex;
  align-items:center;justify-content:center;font-weight:800;font-size:30px;flex:0 0 auto;box-shadow:0 5px 18px rgba(0,200,83,.3)}
.brand-txt h1{font-family:'Saira Condensed';font-weight:800;font-size:40px;letter-spacing:.4px;line-height:.94}
.brand-txt .t-thin{background:linear-gradient(90deg,var(--pos),var(--pos2));-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-weight:800}
.subtitle{font-family:'Saira';font-weight:500;font-size:13px;color:var(--gray3);letter-spacing:.2px;margin-top:7px}
.subtitle .dim{color:var(--gray4)}
.hdr-right{display:flex;align-items:center;gap:11px;flex-wrap:wrap;justify-content:flex-end}
.last-updated{font-family:'Saira Condensed';display:flex;flex-direction:column;align-items:center;text-align:center;gap:2px;
  background:rgba(0,200,83,0.09);border:1px solid rgba(0,200,83,0.4);border-radius:10px;padding:6px 18px;min-width:104px}
.lu-label{font-size:9px;font-weight:600;color:var(--label-dim);text-transform:uppercase;letter-spacing:1.4px;line-height:1}
.lu-val{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:.5px;line-height:1.1;margin-top:1px}
.toolbar{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.switch{display:inline-flex;align-items:center;gap:10px;background:var(--navy3);border:1px solid var(--line);border-radius:10px;
  padding:7px 14px 7px 11px;cursor:pointer;font-family:'Saira';font-weight:600;font-size:12.5px;color:var(--gray3);transition:.16s;white-space:nowrap}
.switch:hover{border-color:var(--hover-border)}
.sw-track{width:38px;height:20px;border-radius:999px;background:var(--navy);border:1px solid var(--line);position:relative;transition:.18s;flex:0 0 auto}
.sw-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--knob);transition:.18s}
.switch[aria-checked="true"]{border-color:rgba(0,200,83,.5);background:rgba(0,200,83,.10);color:var(--pos)}
.switch[aria-checked="true"] .sw-track{background:var(--green);border-color:transparent}
.switch[aria-checked="true"] .sw-knob{left:20px;background:var(--green-dark)}
.btn{font-family:'Saira';font-weight:600;font-size:12px;color:var(--ink);background:var(--navy3);border:1px solid var(--line);
  border-radius:8px;padding:8px 13px;cursor:pointer;transition:.15s;letter-spacing:.2px;white-space:nowrap}
.btn:hover{background:var(--navy4);border-color:var(--hover-border)}
.btn.primary{background:rgba(0,200,83,.12);color:var(--pos);border-color:rgba(0,200,83,.4)}
.btn.primary:hover{background:rgba(0,200,83,.2);border-color:var(--green)}
.hdr-legend{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  margin-top:13px;padding-top:12px;border-top:1px solid var(--line)}
.leg-scale{display:flex;align-items:center;gap:9px}
.leg-label{font-family:'Saira Condensed';font-weight:600;letter-spacing:.6px;text-transform:uppercase;font-size:10.5px;color:var(--gray4)}
.scale{height:8px;width:118px;border-radius:5px;background:linear-gradient(90deg,var(--r1),var(--mid),var(--g0))}
.leg-ends{font-size:10.5px;color:var(--gray4)}
.hints{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:10.5px;color:var(--gray3);background:var(--navy2);border:1px solid var(--line);border-radius:999px;
  padding:4px 11px;letter-spacing:.2px;white-space:nowrap}
.chip b{color:var(--ink);font-weight:600}

/* BRACKET LAYOUT */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:18px;align-items:stretch;flex:1 1 auto;min-width:0}
.boardrow{display:flex;gap:18px;align-items:flex-start}
.standings{flex:0 0 336px;display:none;flex-direction:column;gap:12px}
.standings.on{display:flex}
.st-title{font-family:'Saira Condensed';font-weight:700;font-size:16px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink);padding:6px 0 2px}
.st-sub{font-size:11px;color:var(--gray4);margin-top:-6px;margin-bottom:2px}
.st-grid{display:grid;grid-template-columns:1fr;gap:10px}
.st-grp{background:linear-gradient(180deg,var(--card-top),var(--card-bot));border:1px solid var(--line);border-radius:10px;padding:8px 9px}
.st-gh{font-family:'Saira Condensed';font-weight:700;font-size:12px;letter-spacing:1.2px;color:var(--gray3);text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between}
.st-gh .st-cols{color:var(--gray4);font-family:inherit;letter-spacing:.5px}
.st-row{display:grid;grid-template-columns:13px 16px 1fr 18px 22px 20px;align-items:center;gap:5px;font-size:11.5px;padding:2px 0;color:var(--ink)}
.st-row .st-pos{color:var(--gray4);font-size:10px;text-align:center}
.st-row .st-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-row .st-n{text-align:center;color:var(--gray3);font-variant-numeric:tabular-nums}
.st-row .st-pts{text-align:center;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.st-row.qual{border-left:2px solid var(--pos);margin-left:-9px;padding-left:7px}
.st-row .st-q{color:var(--pos);font-size:10px}
.st-row.adv .st-pos{color:var(--pos)}
.col{display:flex;flex-direction:column;min-width:208px;flex:0 0 auto}
.col.center{min-width:236px}
.coltitle{font-family:'Saira Condensed';font-weight:700;font-size:16px;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--ink);text-align:center;padding:6px 0 9px;position:sticky;top:0;background:transparent;z-index:2}
.colbody{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:8px}

.match{background:linear-gradient(180deg,var(--card-top),var(--card-bot));border:1px solid var(--line);border-radius:10px;
  overflow:hidden;position:relative;transition:.15s;cursor:pointer}
.match:hover{border-color:var(--hover-border);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.match.sel{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 22px rgba(0,200,83,.25)}
.mhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:6px 10px;background:var(--head);
  border-bottom:1px solid var(--line)}
.mhead b{color:var(--ink);font-weight:700;font-size:12px;letter-spacing:.3px;white-space:nowrap;flex:0 0 auto}
.mhead .mv{font-family:'Saira';color:var(--gray3);font-weight:500;font-size:11px;letter-spacing:.2px;text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot{display:flex;align-items:center;gap:9px;padding:10px 11px;min-height:42px;position:relative}
.slot+.slot{border-top:1px solid var(--line)}
.slot .fl{font-size:20px;line-height:1;width:24px;text-align:center;flex:0 0 auto}
.slot .nm{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.slot.ph .nm{color:var(--gray4);font-weight:500;font-style:italic;font-size:14.5px}
.slot .wp{font-family:'Saira Condensed';font-weight:700;font-size:11.5px;color:var(--gray3);flex:0 0 auto}
.slot.win{background:rgba(0,200,83,.07)}
.slot.win .nm{color:var(--pos)}
.slot.win::after{content:"✓";color:var(--green);font-size:11px;font-weight:800;margin-left:2px}
.slot.clk:hover{background:var(--hover-fill)}
.slot select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:0}
.advbtn{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;background:var(--navy4);
  border:1px solid var(--line);border-radius:5px;color:var(--gray3);padding:2px 5px;cursor:pointer;opacity:0;transition:.12s}
.match:hover .advbtn{opacity:1}
.advbtn:hover{background:var(--green);color:#06140a;border-color:transparent}
.clrbtn{position:absolute;left:4px;top:4px;width:16px;height:16px;border-radius:50%;border:1px solid var(--line);
  background:var(--navy3);color:var(--gray3);font-size:8.5px;line-height:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:.12s;padding:0;z-index:3}
.match:hover .clrbtn{opacity:.8}
.clrbtn:hover{opacity:1;background:var(--red);color:#fff;border-color:transparent}
.spacer{flex:1}

/* champion banner */
.champwrap{display:flex;flex-direction:column;justify-content:center;min-width:200px}
.champ-card{background:linear-gradient(180deg,var(--card-top),var(--card-bot));border:1px solid var(--green);border-radius:12px;
  padding:16px;text-align:center;box-shadow:0 0 30px rgba(0,200,83,.18)}
.champ-card .lbl{font-family:'Saira Condensed';letter-spacing:2px;font-size:11px;color:var(--pos);text-transform:uppercase}
.champ-card .fl{font-size:40px;margin:8px 0 2px}
.champ-card .nm{font-family:'Saira Condensed';font-weight:700;font-size:20px}
.champ-card .sub{font-size:11px;color:var(--gray4);margin-top:4px}

/* DETAIL PANEL */
.panel{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:var(--panel-bg);
  border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(0,0,0,.5);transform:translateX(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:40;overflow-y:auto;padding:18px 18px 40px}
.panel.open{transform:translateX(0)}
.panel .x{position:absolute;top:14px;right:14px;background:var(--navy3);border:1px solid var(--line);color:var(--ink);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px}
.panel .x:hover{background:var(--navy4)}
.ph-team{display:flex;align-items:center;gap:11px;margin:2px 0 14px}
.ph-team .fl{font-size:34px}
.ph-team .nm{font-family:'Saira Condensed';font-weight:700;font-size:23px;line-height:1}
.ph-team .meta{font-size:11.5px;color:var(--gray3);margin-top:3px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.kpi{background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.kpi .k{font-size:10px;letter-spacing:.5px;color:var(--gray4);text-transform:uppercase}
.kpi .v{font-family:'Saira Condensed';font-weight:700;font-size:19px;margin-top:1px}
.sectitle{font-family:'Saira Condensed';font-weight:700;letter-spacing:1px;font-size:12px;color:var(--gray3);
  text-transform:uppercase;margin:6px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
.ladder{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.lrow{display:grid;grid-template-columns:78px 1fr 46px;align-items:center;gap:8px;font-size:12px}
.lrow .lb{color:var(--gray3)}
.bar{height:15px;border-radius:4px;background:var(--navy3);overflow:hidden;position:relative}
.bar>span{position:absolute;inset:0 auto 0 0;border-radius:4px}
.lrow .pv{font-family:'Saira Condensed';font-weight:700;text-align:right}
.cmp{display:grid;grid-template-columns:1fr 30px 1fr;gap:6px;align-items:center;margin-bottom:18px}
.cmp .ct{text-align:center}
.cmp .ct .fl{font-size:26px}
.cmp .ct .nm{font-family:'Saira Condensed';font-weight:700;font-size:14px;line-height:1.05;margin-top:2px}
.cmp .ct .gp{font-size:10px;color:var(--gray4)}
.cmp .vs{text-align:center;font-family:'Saira Condensed';color:var(--gray4);font-size:12px}
.cmprow{display:grid;grid-template-columns:1fr 80px 1fr;gap:6px;align-items:center;font-size:12px;
  padding:5px 0;border-bottom:1px solid var(--line)}
.cmprow .clab{text-align:center;color:var(--gray4);font-size:10px;letter-spacing:.4px;text-transform:uppercase}
.cmprow .cv{font-family:'Saira Condensed';font-weight:700;font-size:14px}
.cmprow .cv.l{text-align:right}.cmprow .cv.r{text-align:left}
.cand{font-size:12px;color:var(--gray3);line-height:1.6}
.cblock{margin-bottom:16px}
.chead{font-family:'Saira Condensed';font-weight:700;font-size:14.5px;color:var(--ink);letter-spacing:.3px;
  display:flex;flex-direction:column;gap:2px;margin-bottom:9px}
.chead .csub{font-family:'Saira';font-weight:500;font-size:10.5px;color:var(--gray4);letter-spacing:.2px}
.crow{display:grid;grid-template-columns:22px 1fr 64px 46px;align-items:center;gap:9px;padding:4px 0}
.crfl{font-size:18px;text-align:center;line-height:1}
.crnm{font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crbar{height:13px;border-radius:4px;background:var(--navy3);overflow:hidden;position:relative}
.crbar>i{position:absolute;inset:0 auto 0 0;border-radius:4px}
.crpct{font-family:'Saira Condensed';font-weight:700;font-size:13.5px;text-align:right;color:var(--ink)}
.gsplit{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
.gsplit .gcell{background:var(--navy2);border:1px solid var(--line);border-radius:8px;padding:7px 4px;text-align:center}
.gsplit .gp{font-size:10px;letter-spacing:.5px;color:var(--gray4);text-transform:uppercase}
.gsplit .gv{font-family:'Saira Condensed';font-weight:700;font-size:15px;margin-top:1px}
.prov{font-size:10px;color:var(--gray4);line-height:1.5;margin-top:16px;padding-top:10px;border-top:1px solid var(--line)}
.accent{height:4px;border-radius:3px;margin:-2px 0 14px}
.line{display:flex;align-items:center;gap:10px;background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:14px}
.line .li-ic{color:var(--pos);font-size:14px;flex:0 0 auto}
.li-k{display:block;font-size:10px;letter-spacing:.5px;color:var(--gray4);text-transform:uppercase;line-height:1.2}
.li-v{display:block;font-size:13.5px;color:var(--ink);font-weight:600;margin-top:1px}
.formhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.pills{display:flex;gap:5px}
.fp{width:21px;height:21px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Saira Condensed';font-weight:700;font-size:11px;color:#fff}
.fp-W{background:var(--g0)}.fp-D{background:var(--gray4)}.fp-L{background:var(--red)}
.formhead .rec{font-family:'Saira Condensed';font-weight:700;font-size:13px;color:var(--gray3)}
.frows{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.frow{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:9px;font-size:12.5px}
.fr-r{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff;font-family:'Saira Condensed'}
.fr-o{color:var(--gray3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr-s{font-family:'Saira Condensed';font-weight:700;color:var(--ink)}
.sp2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.spc{background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:9px 12px}
.cand b{color:var(--ink)}
.note{font-size:11px;color:var(--gray4);background:var(--navy2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;line-height:1.5;margin-bottom:14px}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:35}
.scrim.on{opacity:1;pointer-events:auto}
@media(max-width:1180px){
  .boardrow{flex-direction:column}
  .standings{flex-basis:auto;width:100%}
  .standings.on{display:flex}
  .st-grid{grid-template-columns:1fr 1fr 1fr}
}
@media(max-width:640px){
  .wrap{padding:12px 10px 60px}
  .brand-txt h1{font-size:28px}
  .check{width:38px;height:38px;font-size:25px;border-radius:9px}
  .subtitle{font-size:11.5px}
  .panel{width:100vw;max-width:100vw;padding:16px 14px 44px}
  .hdr-legend{margin-top:11px;padding-top:10px}
  .chip{font-size:10px;padding:4px 9px}
  .lu-val{font-size:17px}
  .st-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="hdr-main">
      <div class="brand">
        <span class="check">✓</span>
        <div class="brand-txt">
          <h1>World Cup 2026 <span class="t-thin">— Knockout Bracket</span></h1>
          <div class="subtitle">Action Network Projections <span class="dim">· via Nick Giffen &amp; others</span></div>
        </div>
      </div>
      <div class="hdr-right">
        <div class="last-updated">
          <span class="lu-label">Last Updated</span>
          <span class="lu-val" id="lastUpdated">—</span>
        </div>
        <div class="toolbar">
          <button class="switch" id="projToggle" role="switch" aria-checked="false"
            title="On: fill all Winner/Runner-up slots with projected teams · Off: clear the board">
            <span class="sw-track"><span class="sw-knob"></span></span>
            <span class="sw-label">Projected teams</span>
          </button>
          <button class="switch" id="themeToggle" role="switch" aria-checked="false"
            title="Toggle light / dark appearance">
            <span class="sw-track"><span class="sw-knob"></span></span>
            <span class="sw-label">Light mode</span>
          </button>
        </div>
      </div>
    </div>
    <div class="hdr-legend">
      <div class="leg-scale">
        <span class="leg-label">Win probability</span>
        <span class="scale"></span>
        <span class="leg-ends">low → high</span>
      </div>
      <div class="hints">
        <span class="chip">Tap a <b>team</b> — full path</span>
        <span class="chip">Tap a <b>match</b> — compare</span>
        <span class="chip">Tap an <b>empty slot</b> — assign</span>
      </div>
    </div>
  </header>
  <div class="boardrow">
    <div class="board" id="board"></div>
    <aside class="standings" id="standings"></aside>
  </div>
</div>
<div class="scrim" id="scrim"></div>

<script>
/* ---------- state ---------- */
const SLOTS = {};           // matchNo -> {a:team|null, b:team|null, winner:'a'|'b'|null}
const ALL_MATCHES = {};     // matchNo -> match def + round
const ROUNDS = [["R32","Round of 32",WC.BRACKET.R32],["R16","Round of 16",WC.BRACKET.R16],
                ["QF","Quarter-finals",WC.BRACKET.QF],["SF","Semi-finals",WC.BRACKET.SF]];
WC.BRACKET.R32.forEach(m=>ALL_MATCHES[m.m]={...m,round:"R32"});
WC.BRACKET.R16.forEach(m=>ALL_MATCHES[m.m]={...m,round:"R16"});
WC.BRACKET.QF.forEach(m=>ALL_MATCHES[m.m]={...m,round:"QF"});
WC.BRACKET.SF.forEach(m=>ALL_MATCHES[m.m]={...m,round:"SF"});
ALL_MATCHES[104]={...WC.BRACKET.FINAL,round:"FINAL"};
ALL_MATCHES[103]={...WC.BRACKET.THIRD,round:"THIRD"};
Object.keys(ALL_MATCHES).forEach(n=>SLOTS[n]={a:null,b:null,winner:null});

const _mo={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
const _md=(WC.updated||'').match(/([A-Z][a-z]{2}) (\d{1,2}), (\d{4})/);
document.getElementById('lastUpdated').textContent = WC.updated_label || (_md ? (_mo[_md[1]]+'/'+_md[2]) : '—');

/* ---------- persistence ---------- */
const LSKEY='wc2026_bracket_v1';
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(SLOTS));}catch(e){}}
function load(){try{const r=localStorage.getItem(LSKEY);if(r){const s=JSON.parse(r);
  for(const k in s) if(SLOTS[k]) SLOTS[k]=s[k];}}catch(e){}}

/* ---------- helpers ---------- */
const GRPNAME={W:"Winner",R:"Runner-up"};
function slotLabel(code){
  if(code[0]==="W") return "Winner "+code.slice(2);
  if(code[0]==="R") return "Runner-up "+code.slice(2);
  if(code[0]==="T") return "3rd "+code.slice(2).split("").join("/");
  return code;
}
function eligibleTeams(code){
  if(code[0]==="W"||code[0]==="R") return WC.GROUPS[code.slice(2)]||[];
  if(code[0]==="T"){const gs=code.slice(2).split("");let out=[];gs.forEach(g=>out=out.concat(WC.GROUPS[g]||[]));return out;}
  return [];
}
// resolve the two participants of a match (team names or null) given current state
function participant(matchNo,side){
  const m=ALL_MATCHES[matchNo];const ref=m[side];
  if(typeof ref==="string"){ // R32 slot code
    return {team:SLOTS[matchNo][side], code:ref, kind:"slot"};
  } else { // feeder match number
    const feeder=SLOTS[ref];
    let team=null;
    if(feeder&&feeder.winner){ team = m.loser ? null : (feeder.winner==="a"?feeder.aTeamResolved:feeder.bTeamResolved); }
    if(m.loser && feeder && feeder.winner){ team = feeder.winner==="a"?feeder.bTeamResolved:feeder.aTeamResolved; }
    return {team, code:(m.loser?"Loser ":"Winner ")+ref, kind:"feeder", feeder:ref};
  }
}
function pct(x){return x==null?"—":(Math.round(x*1000)/10).toFixed(1)+"%";}
// green->red self-scaling color within a set of values
function heat(v,min,max){
  if(v==null) return "var(--navy3)";
  let t = max>min ? (v-min)/(max-min) : .5;
  t=Math.max(0,Math.min(1,t));
  // interpolate red(0)->mid(.5)->green(1)
  const stops=[[127,29,29],[82,82,91],[22,163,74]];
  let c;
  if(t<.5){const k=t/.5;c=mix(stops[0],stops[1],k);}else{const k=(t-.5)/.5;c=mix(stops[1],stops[2],k);}
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function mix(a,b,k){return a.map((x,i)=>Math.round(x+(b[i]-x)*k));}

/* ---------- render bracket ---------- */
const board=document.getElementById('board');
let SELECTED=null;
function render(){
  resolveAll();
  board.innerHTML="";
  ROUNDS.forEach(([key,title,arr])=>{
    const col=document.createElement('div');col.className="col"+(key==="SF"?" center":"");
    col.innerHTML=`<div class="coltitle">${title}</div>`;
    const cb=document.createElement('div');cb.className="colbody";
    arr.forEach(m=>cb.appendChild(matchEl(m.m)));
    col.appendChild(cb);board.appendChild(col);
  });
  // champion + final + third
  const fc=document.createElement('div');fc.className="col champwrap";
  fc.innerHTML=`<div class="coltitle">Final</div>`;
  const fb=document.createElement('div');fb.className="colbody";
  fb.appendChild(matchEl(104));
  // champion card
  const champ=championTeam();
  const cc=document.createElement('div');cc.className="champ-card";cc.style.marginTop="14px";
  if(champ){cc.innerHTML=`<div class="lbl">Champion</div><div class="fl">${WC.TEAMS[champ].flag}</div>
     <div class="nm">${champ}</div><div class="sub">${pct(WC.TEAMS[champ].champ)} pre-tournament title odds</div>`;}
  else {cc.innerHTML=`<div class="lbl">Champion</div><div class="fl" style="opacity:.3">🏆</div>
     <div class="nm" style="color:var(--gray4);font-size:15px">To be decided</div>
     <div class="sub">Set the final winner to crown</div>`;}
  fb.appendChild(cc);
  // third place
  const tp=document.createElement('div');tp.style.marginTop="14px";
  tp.innerHTML=`<div class="coltitle" style="font-size:11px">Third place</div>`;
  tp.appendChild(matchEl(103));
  fb.appendChild(tp);
  fc.appendChild(fb);board.appendChild(fc);
}

function matchEl(no){
  const m=ALL_MATCHES[no];const st=SLOTS[no];
  const el=document.createElement('div');el.className="match"+(SELECTED===no?" sel":"");
  const pa=participant(no,"a"),pb=participant(no,"b");
  const vshort = m.venue==="New York/New Jersey" ? "NY/NJ" : m.venue;
  el.innerHTML=`<div class="mhead"><b>Match ${no}</b><span class="mv">${m.date} · ${vshort}</span></div>`;
  el.appendChild(slotEl(no,"a",pa,st));
  el.appendChild(slotEl(no,"b",pb,st));
  el.querySelector('.mhead').addEventListener('click',e=>{e.stopPropagation();openCompare(no);});
  el.addEventListener('click',()=>openCompare(no));
  return el;
}
function slotEl(no,side,part,st){
  const s=document.createElement('div');
  const team=part.team;
  const isWin = st.winner===side;
  s.className="slot"+(team?" clk":" ph")+(isWin?" win":"");
  if(team){
    const T=WC.TEAMS[team];
    s.innerHTML=`<span class="fl">${T.flag}</span><span class="nm">${team}</span><span class="wp">${pct(T.champ)}</span>`;
    s.addEventListener('click',e=>{e.stopPropagation();openTeam(team);});
    // advance control
    if(no!==103){const a=document.createElement('button');a.className="advbtn";a.textContent=isWin?"won":"advance";
      a.title="Mark winner → next round";
      a.addEventListener('click',e=>{e.stopPropagation();setWinner(no,side);});
      s.appendChild(a);}
    // clear control — only for directly-assigned R32 slots (returns the dropdown)
    if(part.kind==="slot"){const x=document.createElement('button');x.className="clrbtn";x.textContent="✕";
      x.title="Remove team — pick another";
      x.addEventListener('click',e=>{e.stopPropagation();assign(no,side,"");});
      s.appendChild(x);}
  } else {
    s.innerHTML=`<span class="fl">·</span><span class="nm">${part.code? (part.kind==="slot"?slotLabel(part.code):part.code) : "TBD"}</span>`;
    if(part.kind==="slot"){
      const sel=document.createElement('select');
      sel.innerHTML=`<option value="">Assign team…</option>`+
        eligibleTeams(part.code).map(t=>`<option value="${t}">${WC.TEAMS[t].flag} ${t}</option>`).join("");
      sel.addEventListener('click',e=>e.stopPropagation());
      sel.addEventListener('change',e=>{assign(no,side,e.target.value);});
      s.appendChild(sel);
    }
  }
  return s;
}

/* ---------- mutations ---------- */
function assign(no,side,team){ SLOTS[no][side]=team||null; if(SLOTS[no].winner===side&&!team)SLOTS[no].winner=null; save();render(); }
function setWinner(no,side){
  const part=participant(no,side); if(!part.team)return;
  SLOTS[no].winner = (SLOTS[no].winner===side?null:side);
  save();render();
}
// resolve aTeamResolved/bTeamResolved on every match so feeders can read winners
function resolveAll(){
  // iterate rounds in order so earlier winners propagate
  const order=[...WC.BRACKET.R32,...WC.BRACKET.R16,...WC.BRACKET.QF,...WC.BRACKET.SF,WC.BRACKET.FINAL,WC.BRACKET.THIRD];
  order.forEach(m=>{
    const a=participant(m.m,"a"),b=participant(m.m,"b");
    SLOTS[m.m].aTeamResolved=a.team;SLOTS[m.m].bTeamResolved=b.team;
    // clear stale winner if participant missing
    if(SLOTS[m.m].winner==="a"&&!a.team)SLOTS[m.m].winner=null;
    if(SLOTS[m.m].winner==="b"&&!b.team)SLOTS[m.m].winner=null;
  });
}
function championTeam(){const f=SLOTS[104];if(f&&f.winner)return f.winner==="a"?f.aTeamResolved:f.bTeamResolved;return null;}

/* ---------- panels ---------- */
const panel=document.getElementById('panel'),pbody=document.getElementById('pbody'),scrim=document.getElementById('scrim');
function showPanel(html){pbody.innerHTML=html;panel.classList.add('open');scrim.classList.add('on');}
function closePanel(){panel.classList.remove('open');scrim.classList.remove('on');SELECTED=null;render();}
document.getElementById('px').addEventListener('click',closePanel);
scrim.addEventListener('click',closePanel);

const LADDER=[["win_grp","Win group"],["qualify","Reach R32"],["top2","Top 2"],["r16","Reach R16"],
              ["qf","Reach QF"],["sf","Reach SF"],["final","Reach final"],["champ","Champion"]];
function teamLadder(team){
  const T=WC.TEAMS[team];
  return `<div class="ladder">`+LADDER.map(([k,lb])=>{
    const v=T[k]; const w=v==null?0:Math.max(2,v*100);
    return `<div class="lrow"><span class="lb">${lb}</span>
      <div class="bar"><span style="width:${w}%;background:${heat(v,0,1)}"></span></div>
      <span class="pv">${pct(v)}</span></div>`;
  }).join("")+`</div>`;
}
function formPills(T){
  if(!T.form||!T.form.length) return "";
  const pills=T.form.map(g=>`<span class="fp fp-${g.r}" title="${g.r} vs ${g.o} ${g.gf}-${g.ga}">${g.r}</span>`).join("");
  const last=T.form.slice(-4).reverse().map(g=>`<div class="frow"><span class="fr-r fp-${g.r}">${g.r}</span><span class="fr-o">${g.o}</span><span class="fr-s">${g.gf}-${g.ga}</span></div>`).join("");
  const rec=T.rec?`${T.rec.W||0}W · ${T.rec.D||0}D · ${T.rec.L||0}L`:"";
  return `<div class="formhead"><div class="pills">${pills}</div><span class="rec">${rec}</span></div><div class="frows">${last}</div>`;
}
function openTeam(team){
  const T=WC.TEAMS[team];
  const projRank=["1st","2nd","3rd","4th"][T.proj_rank]||"—";
  const col=T.color||"var(--green)";
  showPanel(`
    <div class="accent" style="background:linear-gradient(90deg,${col},transparent)"></div>
    <div class="ph-team"><span class="fl">${T.flag}</span><div>
      <div class="nm">${team}</div>
      <div class="meta">Group ${T.group} · projected ${projRank}${T.p_pts!=null?" · "+T.p_pts.toFixed(2)+" pts":""}</div></div></div>
    <div class="kpis">
      <div class="kpi"><div class="k">Title odds · model</div><div class="v" style="color:var(--pos)">${pct(T.champ)}</div></div>
      <div class="kpi"><div class="k">Title odds · market</div><div class="v">${T.mkt!=null?pct(T.mkt):"—"}</div></div>
      <div class="kpi"><div class="k">FIFA rank</div><div class="v">${T.fifa??"—"}</div></div>
      <div class="kpi"><div class="k">Elo</div><div class="v">${T.elo??"—"}</div></div>
    </div>
    ${T.mgr?`<div class="line"><span class="li-ic">★</span><div><span class="li-k">Manager</span><span class="li-v">${T.mgr.name}${T.mgr.nat?" · "+T.mgr.nat:""}${T.mgr.yr?" · since "+T.mgr.yr:""}</span></div></div>`:""}
    ${(T.form&&T.form.length)?`<div class="sectitle">Recent form</div>${formPills(T)}`:""}
    <div class="sectitle">Path probability · Giffen</div>
    ${teamLadder(team)}
    <div class="sectitle">Group finish · Giffen</div>
    <div class="gsplit">
      ${[["1st",T.g1],["2nd",T.g2],["3rd",T.g3],["4th",T.g4]].map(([lb,v])=>
        `<div class="gcell"><div class="gp">${lb}</div><div class="gv">${pct(v)}</div></div>`).join("")}
    </div>
    <div class="note" style="margin-top:8px">Advance as best 3rd: <b>${pct(T.adv3)}</b></div>
    ${T.sp?`<div class="sectitle">Set-piece takers</div>
      <div class="sp2"><div class="spc"><span class="li-k">Penalties</span><span class="li-v">${T.sp.pen||"—"}</span></div>
      <div class="spc"><span class="li-k">Corners / FKs</span><span class="li-v">${T.sp.ck||"—"}</span></div></div>`:""}
    <div class="sectitle">World Cup pedigree</div>
    <div class="sp2"><div class="spc"><span class="li-k">Appearances</span><span class="li-v">${T.wcApps??"—"}</span></div>
      <div class="spc"><span class="li-k">Last edition</span><span class="li-v">${T.prev||"—"}</span></div></div>
    <div class="prov">Model probabilities & group split: Giffen Tournament Sims · Market odds: book consensus · Manager, form, set pieces: Action tool · FIFA/Elo: tool ratings</div>
  `);
}
const CMP=[["champ","Champion · model"],["mkt","Champion · market"],["sf","Reach SF"],["qf","Reach QF"],["r16","Reach R16"],["fifa","FIFA rank"],["elo","Elo"]];
function openCompare(no){
  SELECTED=no;render();
  const m=ALL_MATCHES[no];const pa=participant(no,"a"),pb=participant(no,"b");
  const ta=pa.team,tb=pb.team;
  const head=(p)=>{ if(p.team){const T=WC.TEAMS[p.team];
      return `<div class="ct"><div class="fl">${T.flag}</div><div class="nm">${p.team}</div><div class="gp">Grp ${T.group}</div></div>`;}
    return `<div class="ct"><div class="fl" style="opacity:.3">·</div><div class="nm" style="color:var(--gray4);font-size:12px">${pa===p? (pa.kind==="slot"?slotLabel(pa.code):pa.code):(pb.kind==="slot"?slotLabel(pb.code):pb.code)}</div></div>`;};
  let rows="";
  CMP.forEach(([k,lb])=>{
    const va=ta?WC.TEAMS[ta][k]:null, vb=tb?WC.TEAMS[tb][k]:null;
    const fmt=(v)=>v==null?"—":(k==="fifa"||k==="elo"?v:pct(v));
    rows+=`<div class="cmprow"><div class="cv l">${fmt(va)}</div><div class="clab">${lb}</div><div class="cv r">${fmt(vb)}</div></div>`;
  });
  function codesOf(n){const mm=ALL_MATCHES[n];let o=[];
    ["a","b"].forEach(s=>{const r=mm[s];o=o.concat(typeof r==="string"?[r]:codesOf(r));});return o;}
  function slotTop(code){const mk=code[0]==="W"?"g1":code[0]==="R"?"g2":"g3";
    return eligibleTeams(code).slice().sort((x,y)=>WC.TEAMS[y][mk]-WC.TEAMS[x][mk])[0];}
  function rowsHtml(list,mk){const max=Math.max(...list.map(t=>WC.TEAMS[t][mk]),0.001);
    return list.map(t=>{const v=WC.TEAMS[t][mk];const w=Math.max(3,(v/max)*100);
      return `<div class="crow"><span class="crfl">${WC.TEAMS[t].flag}</span><span class="crnm">${t}</span>`
        +`<span class="crbar"><i style="width:${w}%;background:${heat(v,0,max)}"></i></span>`
        +`<span class="crpct">${pct(v)}</span></div>`;}).join("");}
  const RND={R16:["r16","the Round of 16"],QF:["qf","the Quarter-finals"],
             SF:["sf","the Semi-finals"],FINAL:["final","the Final"],THIRD:["sf","the Semi-finals"]};
  let candHtml="", candTitle="";
  if(pa.kind==="slot" || pb.kind==="slot"){
    candTitle="Who can fill these slots";
    [["a",pa],["b",pb]].forEach(([sd,p])=>{
      if(p.team || p.kind!=="slot") return;
      const mk=p.code[0]==="W"?"g1":p.code[0]==="R"?"g2":"g3";
      const sub=p.code[0]==="W"?("Chance to win Group "+p.code.slice(2))
              :p.code[0]==="R"?("Chance to finish 2nd in Group "+p.code.slice(2))
              :"Chance to finish 3rd in group";
      let cands=eligibleTeams(p.code).slice().sort((x,y)=>WC.TEAMS[y][mk]-WC.TEAMS[x][mk]);
      let shown=cands.filter(t=>WC.TEAMS[t][mk]>=0.005); if(!shown.length)shown=cands.slice(0,3);
      candHtml+=`<div class="cblock"><div class="chead">${slotLabel(p.code)}<span class="csub">${sub}</span></div>${rowsHtml(shown,mk)}</div>`;
    });
  } else if((!pa.team || !pb.team) && RND[m.round]){
    // feeder match still open: projected R32 qualifiers feeding this match, by chance to reach this round
    candTitle="Who could reach this match";
    const [mk,rname]=RND[m.round];
    const set=new Set(); codesOf(no).forEach(c=>{const t=slotTop(c); if(t)set.add(t);});
    let cands=[...set].sort((x,y)=>WC.TEAMS[y][mk]-WC.TEAMS[x][mk]);
    let shown=cands.filter(t=>WC.TEAMS[t][mk]>=0.005).slice(0,10); if(!shown.length)shown=cands.slice(0,6);
    candHtml=`<div class="cblock"><div class="chead">Projected contenders<span class="csub">Projected group qualifiers in this section · chance to reach ${rname}</span></div>${rowsHtml(shown,mk)}</div>`;
  }
  const recS=(t)=>{const r=WC.TEAMS[t]&&WC.TEAMS[t].rec;return r?`${r.W||0}-${r.D||0}-${r.L||0}`:"—";};
  const mgrS=(t)=>{const mr=WC.TEAMS[t]&&WC.TEAMS[t].mgr;return mr?mr.name:"—";};
  const extra=(ta&&tb)?
    `<div class="cmprow"><div class="cv l">${recS(ta)}</div><div class="clab">Form W-D-L</div><div class="cv r">${recS(tb)}</div></div>`
    +`<div class="cmprow"><div class="cv l" style="font-size:11.5px">${mgrS(ta)}</div><div class="clab">Manager</div><div class="cv r" style="font-size:11.5px">${mgrS(tb)}</div></div>`:"";
  showPanel(`
    <div class="sectitle">Match ${no} · ${m.date} · ${m.venue}</div>
    <div class="cmp">${head(pa)}<div class="vs">vs</div>${head(pb)}</div>
    ${(ta||tb)?`<div class="sectitle">Side-by-side</div>${rows}${extra}`:""}
    ${candHtml?`<div class="sectitle" style="margin-top:14px">${candTitle}</div>${candHtml}`:""}
    ${(ta&&tb)?`<div class="note" style="margin-top:14px">Hover a team in the bracket and click <b>advance</b> to push the winner into Match ${nextMatchOf(no)||"—"}.</div>`:""}
  `);
}
function nextMatchOf(no){
  for(const k in ALL_MATCHES){const m=ALL_MATCHES[k];if(m.a===no||m.b===no)return k;}return null;
}

/* ---------- toolbar: single projected/clear toggle ---------- */
function clearBoard(){ for(const k in SLOTS)SLOTS[k]={a:null,b:null,winner:null}; }
function fillProjected(){
  // fill Winner/Runner-up slots from projected order; 3rd-place slots left for manual entry
  WC.BRACKET.R32.forEach(m=>["a","b"].forEach(sd=>{
    const code=m[sd];
    if(code[0]==="W"||code[0]==="R"){
      const teams=WC.GROUPS[code.slice(2)]; const idx=code[0]==="W"?0:1;
      if(teams&&teams[idx])SLOTS[m.m][sd]=teams[idx];
    }
  }));
}
const projToggle=document.getElementById('projToggle');
function setToggle(on){ projToggle.setAttribute('aria-checked', on?'true':'false'); }
projToggle.addEventListener('click',()=>{
  const on = projToggle.getAttribute('aria-checked')!=='true';
  if(on){ fillProjected(); }
  else { if(!confirm("Clear all assigned teams and results?")){return;} clearBoard(); }
  setToggle(on); save(); render(); closePanel();
});

/* ---------- light / dark theme toggle ---------- */
const themeToggle=document.getElementById('themeToggle');
const THEMEKEY='wc2026_theme';
function applyTheme(light){
  document.body.classList.toggle('light', light);
  themeToggle.setAttribute('aria-checked', light?'true':'false');
}
themeToggle.addEventListener('click',()=>{
  const light = themeToggle.getAttribute('aria-checked')!=='true';
  applyTheme(light);
  try{ localStorage.setItem(THEMEKEY, light?'light':'dark'); }catch(e){}
});
(function(){ let t='dark'; try{ t=localStorage.getItem(THEMEKEY)||'dark'; }catch(e){} applyTheme(t==='light'); })();

/* ---------- pre-seed confirmed group winners (verified Jun 23) ---------- */
function seedConfirmed(){
  // Mexico=Win A, USA=Win D, Germany=Win E, Argentina=Win J  (FIFA-confirmed group winners)
  const conf={"W-A":"Mexico","W-D":"United States","W-E":"Germany","W-J":"Argentina"};
  WC.BRACKET.R32.forEach(m=>["a","b"].forEach(sd=>{
    const c=m[sd]; if(conf[c]) SLOTS[m.m][sd]=conf[c];
  }));
}

load();
// only seed if nothing saved yet
let any=false;for(const k in SLOTS){if(SLOTS[k].a||SLOTS[k].b){any=true;break;}}
if(!any)seedConfirmed();
// reflect toggle: on if most Winner/Runner-up slots are filled
(function(){let f=0,t=0;WC.BRACKET.R32.forEach(m=>["a","b"].forEach(sd=>{
  const c=m[sd]; if(c[0]==="W"||c[0]==="R"){t++; if(SLOTS[m.m][sd])f++;}}));
  setToggle(t>0 && f>=t-2);})();
render();

/* ---------- group standings panel (top-right rail) ---------- */
function renderStandings(){
  const el=document.getElementById('standings');
  const S=WC.STANDINGS;
  if(!el) return;
  let played=0;
  if(S){ for(const g in S) S[g].forEach(t=>played+=(t.p||0)); }
  if(!S || played===0){ el.classList.remove('on'); el.innerHTML=''; return; }
  let html='<div class="st-title">Group Standings</div>'
         +'<div class="st-sub">P · GD · Pts &nbsp;·&nbsp; ✓ qualified</div><div class="st-grid">';
  Object.keys(S).sort().forEach(g=>{
    html+=`<div class="st-grp"><div class="st-gh"><span>Group ${g}</span></div>`;
    S[g].forEach((t,i)=>{
      const gd=(t.gd>0?'+':'')+t.gd;
      html+=`<div class="st-row${t.q?' qual':''}">`
          +`<span class="st-pos">${i+1}</span>`
          +`<span>${t.flag||''}</span>`
          +`<span class="st-nm">${t.team}${t.q?' <span class="st-q">✓</span>':''}</span>`
          +`<span class="st-n">${t.p}</span>`
          +`<span class="st-n">${gd}</span>`
          +`<span class="st-pts">${t.pts}</span></div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html+'</div>';
  el.classList.add('on');
}
renderStandings();
